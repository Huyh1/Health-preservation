<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>养生知识库</title>
    <style>
        :root {
            --bg: #f5f3ee;
            --bg2: #ffffff;
            --bg3: #ebe7df;
            --ink: #2c3e30;
            --muted: #7a8a7e;
            --rule: #d8d4cc;
            --accent: #4a8c5f;
            --accent-light: #6dbd85;
            --accent2: #d4835a;
            --accent2-light: #e8a585;
            --danger: #c0533e;
            --warning: #d4a03a;
            --info: #5a8cb4;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --sidebar-w: 260px;
            --header-h: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.6;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: var(--bg2);
            border-bottom: 1px solid var(--rule);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
            gap: 20px;
            box-shadow: var(--shadow-sm);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
        }

        .header-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            height: 38px;
            padding: 0 16px 0 40px;
            border: 1px solid var(--rule);
            border-radius: var(--radius-md);
            font-size: 14px;
            background: var(--bg);
            color: var(--ink);
            outline: none;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            background: var(--bg2);
            box-shadow: 0 0 0 3px rgba(74, 140, 95, 0.1);
        }

        .search-box .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 16px;
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            white-space: nowrap;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg);
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--muted);
        }

        .stat-pill .stat-num {
            font-weight: 700;
            color: var(--accent);
        }

        .stat-pill.read .stat-num { color: var(--info); }
        .stat-pill.used .stat-num { color: var(--accent2); }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            color: var(--ink);
            cursor: pointer;
            padding: 4px;
        }

        /* Layout */
        .layout {
            display: flex;
            padding-top: var(--header-h);
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: var(--header-h);
            left: 0;
            bottom: 0;
            width: var(--sidebar-w);
            background: var(--bg2);
            border-right: 1px solid var(--rule);
            overflow-y: auto;
            padding: 16px 0;
            transition: transform 0.3s ease;
            z-index: 50;
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            padding: 0 20px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title .collapse-btn {
            cursor: pointer;
            font-size: 14px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .sidebar-title .collapse-btn:hover { opacity: 1; }

        .sidebar-list {
            list-style: none;
        }

        .sidebar-item {
            padding: 8px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: var(--ink);
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .sidebar-item:hover {
            background: var(--bg);
            color: var(--accent);
        }

        .sidebar-item.active {
            background: rgba(74, 140, 95, 0.08);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .sidebar-item .item-count {
            font-size: 12px;
            color: var(--muted);
            background: var(--bg3);
            padding: 1px 8px;
            border-radius: 10px;
            min-width: 24px;
            text-align: center;
        }

        .sidebar-item.active .item-count {
            background: var(--accent);
            color: white;
        }

        .sidebar-item .item-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-item .item-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        /* Main content */
        .main {
            flex: 1;
            margin-left: var(--sidebar-w);
            padding: 24px 32px;
            transition: margin 0.3s ease;
        }

        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .main-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-title .filter-badge {
            font-size: 13px;
            font-weight: 400;
            color: var(--muted);
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-chip {
            padding: 5px 14px;
            border: 1px solid var(--rule);
            border-radius: 20px;
            font-size: 13px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg2);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .filter-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .filter-chip.active.read { background: var(--info); border-color: var(--info); }
        .filter-chip.active.used { background: var(--accent2); border-color: var(--accent2); }
        .filter-chip.active.unread { background: var(--muted); border-color: var(--muted); }

        /* Article grid */
        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .article-card {
            background: var(--bg2);
            border: 1px solid var(--rule);
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .article-card:hover {
            border-color: var(--accent-light);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .article-card.read {
            border-left: 3px solid var(--info);
        }

        .article-card.used {
            border-left: 3px solid var(--accent2);
        }

        .article-card.read.used {
            border-left: 3px solid;
            border-image: linear-gradient(to bottom, var(--info), var(--accent2)) 1;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.4;
            flex: 1;
        }

        .card-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .card-action-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.2s;
            background: var(--bg);
            color: var(--muted);
        }

        .card-action-btn:hover {
            transform: scale(1.1);
        }

        .card-action-btn.read-btn.active {
            background: var(--info);
            color: white;
        }

        .card-action-btn.used-btn.active {
            background: var(--accent2);
            color: white;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .card-tag.folder {
            background: var(--bg3);
            color: var(--muted);
        }

        .card-tag.season {
            background: rgba(74, 140, 95, 0.1);
            color: var(--accent);
        }

        .card-tag.season.春季 { background: rgba(108, 177, 133, 0.15); color: #4a8c5f; }
        .card-tag.season.夏季 { background: rgba(212, 128, 90, 0.15); color: #d4835a; }
        .card-tag.season.秋季 { background: rgba(180, 130, 60, 0.15); color: #b4823c; }
        .card-tag.season.冬季 { background: rgba(90, 120, 160, 0.15); color: #5a7896; }
        .card-tag.season.通用 { background: var(--bg3); color: var(--muted); }

        .card-tag.topic {
            background: rgba(212, 160, 58, 0.12);
            color: var(--warning);
        }

        .card-preview {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
            margin-top: auto;
        }

        .card-status {
            display: flex;
            gap: 6px;
        }

        .status-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 600;
        }

        .status-badge.read { background: rgba(90, 140, 180, 0.15); color: var(--info); }
        .status-badge.used { background: rgba(212, 131, 90, 0.15); color: var(--accent2); }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .no-results .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

        /* Preview Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg2);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 720px;
            margin: auto;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--rule);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .modal-title-area {
            flex: 1;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--bg);
            color: var(--danger);
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--rule);
        }

        .modal-action-btn {
            padding: 8px 16px;
            border: 1px solid var(--rule);
            border-radius: var(--radius-md);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg2);
            color: var(--ink);
        }

        .modal-action-btn:hover {
            border-color: var(--accent);
        }

        .modal-action-btn.active.read {
            background: var(--info);
            color: white;
            border-color: var(--info);
        }

        .modal-action-btn.active.used {
            background: var(--accent2);
            color: white;
            border-color: var(--accent2);
        }

        .modal-body {
            padding: 30px 34px 36px;
            font-size: 16px;
            line-height: 2.05;
            letter-spacing: 0.2px;
            color: var(--ink);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

        /* Progress bar */
        .progress-container {
            margin-bottom: 16px;
            background: var(--bg2);
            border: 1px solid var(--rule);
            border-radius: var(--radius-md);
            padding: 12px 16px;
        }

        .progress-bar-wrapper {
            height: 6px;
            background: var(--bg3);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--muted);
        }

        .progress-info .progress-label {
            font-weight: 600;
            color: var(--ink);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--ink);
            color: white;
            padding: 10px 24px;
            border-radius: var(--radius-md);
            font-size: 14px;
            z-index: 300;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .article-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 12px;
                gap: 12px;
            }
            .header-stats { display: none; }
            .menu-toggle { display: block; }
            .sidebar {
                transform: translateX(-100%);
                box-shadow: var(--shadow-lg);
            }
            .sidebar.open { transform: translateX(0); }
            .main {
                margin-left: 0;
                padding: 16px;
            }
            .article-grid {
                grid-template-columns: 1fr;
            }
            .modal {
                border-radius: var(--radius-md);
            }
            .modal-body { padding: 16px; font-size: 14px; }
        }

        /* Sidebar overlay for mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: var(--header-h);
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 40;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Scrollbar */
        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

        /* Modal extra: 总结/解析、短视频文案、话题 */
        .modal-extra {
            display: none;
            border-top: 1px solid var(--rule);
            padding: 22px 34px 30px;
            background: var(--bg);
        }

        .meta-block { margin-bottom: 22px; }
        .meta-block:last-child { margin-bottom: 0; }

        .meta-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-text {
            font-size: 14.5px;
            line-height: 1.95;
            color: var(--ink);
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg2);
            border: 1px solid var(--rule);
            border-radius: var(--radius-md);
            padding: 16px 18px;
        }

        .card-tag.meta {
            background: rgba(90, 140, 180, 0.12);
            color: var(--info);
        }

        @media (max-width: 768px) {
            .modal-extra { padding: 18px 16px 22px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
        <div class="header-logo">
            <span class="logo-icon">&#127807;</span>
            <span>养生知识库</span>
        </div>
        <div class="search-box">
            <span class="search-icon">&#128269;</span>
            <input type="text" id="searchInput" placeholder="搜索文章标题..." oninput="handleSearch()">
        </div>
        <div class="header-stats">
            <div class="stat-pill">
                <span>&#128218;</span>
                <span>共 <span class="stat-num" id="totalCount">0</span> 篇</span>
            </div>
            <div class="stat-pill read">
                <span>&#9989;</span>
                <span>已读 <span class="stat-num" id="readCount">0</span></span>
            </div>
            <div class="stat-pill used">
                <span>&#127873;</span>
                <span>已用 <span class="stat-num" id="usedCount">0</span></span>
            </div>
        </div>
    </header>

    <!-- Layout -->
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">
                    <span>&#128193; 分类浏览</span>
                </div>
                <ul class="sidebar-list" id="folderList"></ul>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">
                    <span>&#127802; 按季节</span>
                </div>
                <ul class="sidebar-list" id="seasonList"></ul>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">
                    <span>&#127991; 按主题</span>
                </div>
                <ul class="sidebar-list" id="topicList"></ul>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- Main -->
        <main class="main" id="main">
            <div class="main-header">
                <div class="main-title" id="mainTitle">
                    全部文章
                    <span class="filter-badge" id="filterBadge"></span>
                </div>
                <div class="filter-bar">
                    <div class="filter-chip active" data-filter="all" onclick="setStatusFilter('all')">
                        &#128218; 全部
                    </div>
                    <div class="filter-chip" data-filter="unread" onclick="setStatusFilter('unread')">
                        &#9898; 未读
                    </div>
                    <div class="filter-chip" data-filter="read" onclick="setStatusFilter('read')">
                        &#9989; 已读
                    </div>
                    <div class="filter-chip" data-filter="used" onclick="setStatusFilter('used')">
                        &#127873; 已使用
                    </div>
                </div>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-info">
                    <span class="progress-label">阅读进度</span>
                    <span id="progressText">0 / 0 (0%)</span>
                </div>
                <div class="progress-bar-wrapper">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
            </div>

            <div class="article-grid" id="articleGrid">
                <div class="loading">加载中...</div>
            </div>
        </main>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title-area">
                    <div class="modal-title" id="modalTitle"></div>
                    <div class="modal-tags" id="modalTags"></div>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-actions">
                <button class="modal-action-btn" id="modalReadBtn" onclick="toggleRead(currentModalId)">
                    <span>&#9989;</span> 标记已读
                </button>
                <button class="modal-action-btn" id="modalUsedBtn" onclick="toggleUsed(currentModalId)">
                    <span>&#127873;</span> 标记已使用
                </button>
                <button class="modal-action-btn" id="modalCopyBtn" onclick="copyModalContent()">
                    <span>&#128203;</span> 复制文案
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-extra" id="modalExtra"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="data.js"></script>
    <script src="meta.js"></script>
    <script>
        // State
        let allArticles = [];
        let filteredArticles = [];
        let currentFilter = { type: 'all', value: null };
        let currentStatusFilter = 'all';
        let searchQuery = '';
        let currentModalId = null;
        let marks = { read: {}, used: {} };

        // Folder icons and labels
        const folderConfig = {
            '为什': { icon: '&#10067;', label: '为什么' },
            '什么': { icon: '&#128240;', label: '什么' },
            '哪些': { icon: '&#128221;', label: '哪些' },
            '如何': { icon: '&#128737;', label: '如何' },
            '怎么': { icon: '&#128295;', label: '怎么' },
            '怎样': { icon: '&#9999;', label: '怎样' },
            '盘点': { icon: '&#128202;', label: '盘点' },
            '适合': { icon: '&#127881;', label: '适合' },
            '预防': { icon: '&#129657;', label: '预防' }
        };

        const seasonIcons = {
            '春季': '&#127800;',
            '夏季': '&#9728;',
            '秋季': '&#127810;',
            '冬季': '&#10052;',
            '通用': '&#127760;'
        };

        const topicIcons = {
            '饮食养生': '&#127858;',
            '疾病预防': '&#129657;',
            '御寒保暖': '&#128293;',
            '皮肤护理': '&#129702;',
            '防晒美白': '&#9728;',
            '流感传染病': '&#129440;',
            '过敏防护': '&#128465;',
            '减肥瘦身': '&#9878;',
            '防蚊驱虫': '&#129439;',
            '日常保健': '&#128737;',
            '睡眠调理': '&#128721;',
            '美容护肤': '&#128136;',
            '运动健身': '&#127939;',
            '补肾壮阳': '&#128170;',
            '心理健康': '&#128156;',
            '其他': '&#128218;'
        };

        // Load marks from localStorage
        function loadMarks() {
            try {
                const saved = localStorage.getItem('yangsheng_marks');
                if (saved) {
                    marks = JSON.parse(saved);
                }
            } catch(e) {
                marks = { read: {}, used: {} };
            }
        }

        function saveMarks() {
            localStorage.setItem('yangsheng_marks', JSON.stringify(marks));
        }

        function toggleRead(id) {
            const key = String(id);
            marks.read[key] = !marks.read[key];
            if (!marks.read[key]) delete marks.read[key];
            saveMarks();
            updateStats();
            renderArticles();
            updateModalButtons();
            showToast(marks.read[key] ? '已标记为已读' : '已取消已读标记');
        }

        function toggleUsed(id) {
            const key = String(id);
            marks.used[key] = !marks.used[key];
            if (!marks.used[key]) delete marks.used[key];
            saveMarks();
            updateStats();
            renderArticles();
            updateModalButtons();
            showToast(marks.used[key] ? '已标记为已使用' : '已取消已使用标记');
        }

        function updateModalButtons() {
            if (currentModalId === null) return;
            const key = String(currentModalId);
            const readBtn = document.getElementById('modalReadBtn');
            const usedBtn = document.getElementById('modalUsedBtn');

            if (marks.read[key]) {
                readBtn.classList.add('active', 'read');
                readBtn.innerHTML = '<span>&#9989;</span> 已读';
            } else {
                readBtn.classList.remove('active', 'read');
                readBtn.innerHTML = '<span>&#9989;</span> 标记已读';
            }

            if (marks.used[key]) {
                usedBtn.classList.add('active', 'used');
                usedBtn.innerHTML = '<span>&#127873;</span> 已使用';
            } else {
                usedBtn.classList.remove('active', 'used');
                usedBtn.innerHTML = '<span>&#127873;</span> 标记已使用';
            }
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = allArticles.length;
            document.getElementById('readCount').textContent = Object.keys(marks.read).length;
            document.getElementById('usedCount').textContent = Object.keys(marks.used).length;

            // Update progress
            const readCount = Object.keys(marks.read).length;
            const total = allArticles.length;
            const percent = total > 0 ? Math.round((readCount / total) * 100) : 0;
            document.getElementById('progressText').textContent = `${readCount} / ${total} (${percent}%)`;
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function buildSidebar() {
            // Folders
            const folderCounts = {};
            allArticles.forEach(a => {
                folderCounts[a.folder] = (folderCounts[a.folder] || 0) + 1;
            });

            const folderList = document.getElementById('folderList');
            folderList.innerHTML = `
                <li class="sidebar-item ${currentFilter.type === 'all' ? 'active' : ''}" onclick="setFilter('all', null)">
                    <span class="item-label"><span class="item-icon">&#128218;</span> 全部文章</span>
                    <span class="item-count">${allArticles.length}</span>
                </li>
            `;
            Object.keys(folderCounts).sort().forEach(folder => {
                const config = folderConfig[folder] || { icon: '&#128193;', label: folder };
                folderList.innerHTML += `
                    <li class="sidebar-item ${currentFilter.type === 'folder' && currentFilter.value === folder ? 'active' : ''}" onclick="setFilter('folder', '${folder}')">
                        <span class="item-label"><span class="item-icon">${config.icon}</span> ${config.label}</span>
                        <span class="item-count">${folderCounts[folder]}</span>
                    </li>
                `;
            });

            // Seasons
            const seasonCounts = {};
            allArticles.forEach(a => {
                a.seasons.forEach(s => {
                    seasonCounts[s] = (seasonCounts[s] || 0) + 1;
                });
            });

            const seasonList = document.getElementById('seasonList');
            seasonList.innerHTML = '';
            ['春季', '夏季', '秋季', '冬季', '通用'].forEach(season => {
                if (seasonCounts[season]) {
                    seasonList.innerHTML += `
                        <li class="sidebar-item ${currentFilter.type === 'season' && currentFilter.value === season ? 'active' : ''}" onclick="setFilter('season', '${season}')">
                            <span class="item-label"><span class="item-icon">${seasonIcons[season]}</span> ${season}</span>
                            <span class="item-count">${seasonCounts[season]}</span>
                        </li>
                    `;
                }
            });

            // Topics
            const topicCounts = {};
            allArticles.forEach(a => {
                a.topics.forEach(t => {
                    topicCounts[t] = (topicCounts[t] || 0) + 1;
                });
            });

            const topicList = document.getElementById('topicList');
            topicList.innerHTML = '';
            Object.keys(topicCounts).sort((a, b) => {
                // "其他" always at the end
                if (a === '其他') return 1;
                if (b === '其他') return -1;
                return topicCounts[b] - topicCounts[a];
            }).forEach(topic => {
                const icon = topicIcons[topic] || '&#128218;';
                topicList.innerHTML += `
                    <li class="sidebar-item ${currentFilter.type === 'topic' && currentFilter.value === topic ? 'active' : ''}" onclick="setFilter('topic', '${topic}')">
                        <span class="item-label"><span class="item-icon">${icon}</span> ${topic}</span>
                        <span class="item-count">${topicCounts[topic]}</span>
                    </li>
                `;
            });
        }

        function setFilter(type, value) {
            currentFilter = { type, value };
            renderArticles();
            buildSidebar();
            updateMainTitle();

            // Close sidebar on mobile
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('active');
            }
        }

        function setStatusFilter(status) {
            currentStatusFilter = status;
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active', 'read', 'used', 'unread');
                if (chip.dataset.filter === status) {
                    chip.classList.add('active');
                    if (status === 'read') chip.classList.add('read');
                    if (status === 'used') chip.classList.add('used');
                    if (status === 'unread') chip.classList.add('unread');
                }
            });
            renderArticles();
        }

        function updateMainTitle() {
            const titleEl = document.getElementById('mainTitle');
            const badgeEl = document.getElementById('filterBadge');
            let title = '全部文章';
            let badge = '';

            if (currentFilter.type === 'folder') {
                const config = folderConfig[currentFilter.value] || { label: currentFilter.value };
                title = config.label + ' 类文章';
            } else if (currentFilter.type === 'season') {
                title = currentFilter.value + '养生';
            } else if (currentFilter.type === 'topic') {
                title = currentFilter.value;
            }

            badge = `（${filteredArticles.length} 篇）`;
            titleEl.innerHTML = `${title} <span class="filter-badge">${badge}</span>`;
        }

        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            renderArticles();
        }

        function getFilteredArticles() {
            let result = allArticles;

            // Filter by category
            if (currentFilter.type === 'folder') {
                result = result.filter(a => a.folder === currentFilter.value);
            } else if (currentFilter.type === 'season') {
                result = result.filter(a => a.seasons.includes(currentFilter.value));
            } else if (currentFilter.type === 'topic') {
                result = result.filter(a => a.topics.includes(currentFilter.value));
            }

            // Filter by status
            if (currentStatusFilter === 'read') {
                result = result.filter(a => marks.read[String(a.id)]);
            } else if (currentStatusFilter === 'used') {
                result = result.filter(a => marks.used[String(a.id)]);
            } else if (currentStatusFilter === 'unread') {
                result = result.filter(a => !marks.read[String(a.id)]);
            }

            // Filter by search
            if (searchQuery) {
                result = result.filter(a =>
                    a.title.toLowerCase().includes(searchQuery) ||
                    a.content.toLowerCase().includes(searchQuery)
                );
            }

            return result;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderArticles() {
            filteredArticles = getFilteredArticles();
            updateMainTitle();
            const grid = document.getElementById('articleGrid');

            if (filteredArticles.length === 0) {
                grid.innerHTML = `
                    <div class="no-results" style="grid-column: 1 / -1;">
                        <div class="icon">&#128533;</div>
                        <p>没有找到匹配的文章</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredArticles.map(article => {
                const isRead = marks.read[String(article.id)];
                const isUsed = marks.used[String(article.id)];
                const cardClasses = ['article-card'];
                if (isRead) cardClasses.push('read');
                if (isUsed) cardClasses.push('used');

                const folderConfigItem = folderConfig[article.folder] || { icon: '&#128193;', label: article.folder };

                const tagsHtml = `
                    <span class="card-tag folder">${folderConfigItem.label}</span>
                    ${article.seasons.map(s => `<span class="card-tag season ${s}">${s}</span>`).join('')}
                    ${article.topics.map(t => `<span class="card-tag topic">${t}</span>`).join('')}
                    ${article.summary ? '<span class="card-tag meta">已解析</span>' : ''}
                `;

                const statusBadges = [];
                if (isRead) statusBadges.push('<span class="status-badge read">已读</span>');
                if (isUsed) statusBadges.push('<span class="status-badge used">已用</span>');

                const preview = article.content.substring(0, 120).replace(/\n/g, ' ');

                return `
                    <div class="${cardClasses.join(' ')}" onclick="openModal(${article.id})">
                        <div class="card-header">
                            <div class="card-title">${escapeHtml(article.title)}</div>
                            <div class="card-actions" onclick="event.stopPropagation()">
                                <button class="card-action-btn read-btn ${isRead ? 'active' : ''}" onclick="toggleRead(${article.id})" title="标记已读">
                                    ${isRead ? '&#9989;' : '&#9898;'}
                                </button>
                                <button class="card-action-btn used-btn ${isUsed ? 'active' : ''}" onclick="toggleUsed(${article.id})" title="标记已使用">
                                    ${isUsed ? '&#127873;' : '&#127873;'}
                                </button>
                            </div>
                        </div>
                        <div class="card-tags">${tagsHtml}</div>
                        <div class="card-preview">${escapeHtml(preview)}...</div>
                        <div class="card-footer">
                            <span>${article.contentLength} 字</span>
                            <div class="card-status">${statusBadges.join('')}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(id) {
            const article = allArticles.find(a => a.id === id);
            if (!article) return;

            currentModalId = id;
            document.getElementById('modalTitle').textContent = article.title;

            const folderConfigItem = folderConfig[article.folder] || { icon: '&#128193;', label: article.folder };
            const tagsHtml = `
                <span class="card-tag folder">${folderConfigItem.label}</span>
                ${article.seasons.map(s => `<span class="card-tag season ${s}">${s}</span>`).join('')}
                ${article.topics.map(t => `<span class="card-tag topic">${t}</span>`).join('')}
            `;
            document.getElementById('modalTags').innerHTML = tagsHtml;
            document.getElementById('modalBody').textContent = article.content;

            // 扩展元数据：总结/解析、短视频文案（话题并入文案内）
            const extraEl = document.getElementById('modalExtra');
            const hashtags = (article.hashtags && article.hashtags.length) ? article.hashtags : [];
            if (article.summary || article.videoScript || hashtags.length) {
                let html = '';
                if (article.summary) {
                    html += `
                        <div class="meta-block">
                            <div class="meta-title">&#128204; 总结 / 解析</div>
                            <div class="meta-text">${escapeHtml(article.summary)}</div>
                        </div>`;
                }
                if (article.videoScript) {
                    // 话题合并到短视频文案末尾，作为可一并复制的话题行
                    let scriptText = article.videoScript;
                    if (hashtags.length) {
                        scriptText += '\n\n' + hashtags.map(h => '#' + h).join(' ');
                    }
                    html += `
                        <div class="meta-block">
                            <div class="meta-title">&#127916; 短视频文案</div>
                            <div class="meta-text">${escapeHtml(scriptText)}</div>
                        </div>`;
                } else if (hashtags.length) {
                    // 无文案时，话题仍作为单独可复制文本展示
                    html += `
                        <div class="meta-block">
                            <div class="meta-title">&#127991; 话题</div>
                            <div class="meta-text">${hashtags.map(h => '#' + escapeHtml(h)).join(' ')}</div>
                        </div>`;
                }
                extraEl.innerHTML = html;
                extraEl.style.display = 'block';
            } else {
                extraEl.innerHTML = '';
                extraEl.style.display = 'none';
            }

            updateModalButtons();

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
            currentModalId = null;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 复制文案：优先复制“短视频文案 + 话题”，否则复制全文
        function copyModalContent() {
            const article = allArticles.find(a => a.id === currentModalId);
            if (!article) return;
            let text = '';
            if (article.videoScript) {
                text = article.videoScript;
                if (article.hashtags && article.hashtags.length) {
                    text += '\n\n' + article.hashtags.map(h => '#' + h).join(' ');
                }
            } else {
                text = (article.title || '') + '\n\n' + (article.content || '');
            }
            const done = () => showToast('已复制到剪贴板');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
            } else {
                fallbackCopy(text, done);
            }
        }

        function fallbackCopy(text, done) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); done(); } catch (e) { showToast('复制失败，请手动选择文本'); }
            document.body.removeChild(ta);
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Close modal on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // Initialize
        function init() {
            loadMarks();
            allArticles = (ARTICLE_DATA || []).map(a => {
                const meta = (typeof ARTICLE_META !== 'undefined' && ARTICLE_META[a.id]) || {};
                return Object.assign({}, a, meta);
            });
            updateStats();
            buildSidebar();
            renderArticles();
        }

        init();
    </script>
</body>
</html>
